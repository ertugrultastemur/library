spring:
  application:
    name: gateway
  profiles:
    active: test
  cloud:
    config:
      enabled: false
    vault:
      enabled: true
      host: localhost
      port: 8200
      scheme: http
      authentication: TOKEN
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: gateway
        default-context: default
      fail-fast: true
  config:
    import: optional:vault://
management:
  endpoints:
    web:
      exposure:
        include: "*"
server:
  port: 8888
